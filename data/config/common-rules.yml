# Common rules shared by all EFS layouts.
# Include this file from layout-specific configs with:
#   include: [common-rules.yml]
#
# Layout-specific configs should add their own runway section rules/moves
# (the runway section IDs differ between single- and dual-runway layouts).

sectionRules:
  # === DEPARTURE FLOW ===

  # PENDING DEP: Departures without clearance (no groundstate or ONFREQ)
  pending_dep:
    sectionId: pending_dep
    direction: departure
    airborne: false
    groundstates: ['', NSTS, ONFREQ]
    clearance: false
    priority: 40

  # CLEARED: Departures with clearance flag
  cleared:
    sectionId: cleared
    direction: departure
    airborne: false
    clearance: true
    groundstates: ['', NSTS, ONFREQ, DE-ICE]  # Not yet pushing
    priority: 50

  # PUSH&START: Departures with STUP or PUSH
  push_start:
    sectionId: push_start
    direction: departure
    airborne: false
    groundstates: [STUP, PUSH]
    priority: 60

  # TAXI: Departures taxiing (after pushback, before lineup)
  taxi_dep:
    sectionId: taxi
    direction: departure
    airborne: false
    groundstates: [TAXI, TXIN]
    priority: 30

  # CTR DEP: Missed approach — airborne arrival controlled by me (highest priority)
  ctr_dep_missed_approach:
    sectionId: ctr_dep
    missedApproach: true
    controller: myself
    airborne: true
    priority: 105

  # CTR DEP: Airborne departures (groundstate DEPA + airborne flag)
  ctr_dep_airborne:
    sectionId: ctr_dep
    direction: departure
    airborne: true
    priority: 100

  # === LOCAL FLIGHT GROUND FLOW (mirrors departure flow) ===

  # PENDING DEP: Local flights without clearance
  pending_dep_local:
    sectionId: pending_dep
    direction: local
    airborne: false
    groundstates: ['', NSTS, ONFREQ]
    clearance: false
    priority: 40

  # CLEARED: Local flights with clearance flag
  cleared_local:
    sectionId: cleared
    direction: local
    airborne: false
    clearance: true
    groundstates: ['', NSTS, ONFREQ]
    priority: 50

  # PUSH&START: Local flights with DE-ICE/STUP/PUSH
  push_start_local:
    sectionId: push_start
    direction: local
    airborne: false
    groundstates: [DE-ICE, STUP, PUSH]
    priority: 60

  # TAXI: Local flights taxiing out (pre-departure phase)
  taxi_dep_local:
    sectionId: taxi
    direction: local
    airborne: false
    groundstates: [TAXI]
    priority: 30

  # TAXI: Local flights after landing (post-arrival phase)
  taxi_arr_local:
    sectionId: taxi
    direction: local
    airborne: false
    groundstates: [ARR, TXIN]
    priority: 35

  # CTR DEP: Airborne local flights (user can manually drag to CTR ARR)
  ctr_dep_airborne_local:
    sectionId: ctr_dep
    direction: local
    airborne: true
    priority: 100

  # === ARRIVAL FLOW ===

  # INBOUND: Arrivals not yet assumed (ARR groundstate or just arriving)
  inbound_arr_groundstate:
    sectionId: inbound
    direction: arrival
    airborne: true
    groundstates: ['', NSTS, ARR]
    controller: not_myself
    priority: 70

  # CTR ARR: Arrivals assumed by me
  ctr_arr_assumed:
    sectionId: ctr_arr
    direction: arrival
    controller: myself
    airborne: true
    groundstates: ['', NSTS, ARR]
    priority: 80

  # CTR ARR: Arrivals inside CTR boundary (real LFV data)
  ctr_arr_within_ctr:
    sectionId: ctr_arr
    direction: arrival
    airborne: true
    groundstates: ['', NSTS, ARR]
    withinCtr: true
    priority: 76

  # CTR ARR: Fallback - arrivals below 1500ft AGL (when CTR data unavailable)
  ctr_arr_low_altitude:
    sectionId: ctr_arr
    direction: arrival
    airborne: true
    groundstates: ['', NSTS, ARR]
    maxAltitudeAboveField: 1500
    priority: 75

  # TAXI: Arrivals taxiing in (after vacating runway)
  taxi_arr:
    sectionId: taxi
    direction: arrival
    airborne: false
    groundstates: ['', NSTS, ARR, TAXI, TXIN]
    priority: 30

  # === FALLBACKS ===

  # Catch-all for arrivals at our airport
  fallback_arrival:
    sectionId: inbound
    direction: arrival
    airborne: true
    priority: 5

  # Catch-all for departures at our airport
  fallback_departure:
    sectionId: pending_dep
    direction: departure
    priority: 5

  # Catch-all for local flights
  fallback_local:
    sectionId: pending_dep
    direction: local
    priority: 5

actionRules:
  # === ROLE-SPECIFIC RULES (high priority overrides) ===

  # DEL: READY for cleared departures/local (sets DE-ICE + transfer to GND, instead of PUSH)
  # Only when GND is separately online — if DEL is also covering GND, use PUSH instead
  ready_del:
    action: READY
    direction: either
    controller: myself
    clearance: true
    groundstates: ['', ONFREQ, STUP, NSTS]
    myRole: [DEL]
    notMyRole: [GND]
    priority: 120

  # DEL: CLNC always available for pending departures/local
  clnc_del:
    action: CLNC
    sectionId: pending_dep
    direction: either
    clearance: false
    myRole: [DEL]
    priority: 115

  # DEL: ASSUME ground departures/local
  assume_dep_del:
    action: ASSUME
    direction: either
    controller: not_myself
    airborne: false
    myRole: [DEL]
    priority: 110

  # GND: XFER to TWR for taxi departures/local — only when TWR is separately online
  # (If GND is covering TWR top-down, LU applies instead)
  xfer_gnd_taxi_dep:
    action: XFER
    direction: either
    controller: myself
    groundstates: [TAXI]
    myRole: [GND]
    notMyRole: [TWR]
    priority: 115

  # GND/TWR/APP/CTR: PUSH for DE-ICE departures/local (after assuming from DEL)
  push_deice_gnd:
    action: PUSH
    sectionId: push_start
    direction: either
    controller: myself
    groundstates: [DE-ICE]
    myRole: [GND, TWR, APP, CTR]
    priority: 113

  # GND: TXI for on-ground arrivals/local (after landing)
  txi_arr_gnd:
    action: TXI
    direction: either
    controller: myself
    groundstates: [ARR]
    airborne: false
    myRole: [GND]
    priority: 112

  # GND: ASSUME on-ground arrivals (handoff from TWR)
  assume_arr_gnd:
    action: ASSUME
    direction: arrival
    controller: not_myself
    airborne: false
    myRole: [GND]
    priority: 111

  # TWR/APP/CTR: XFER to GND for on-ground arrivals/local when GND is separately online
  # nextControllerRole ensures we only show XFER when the plugin says the next controller
  # is actually a GND position, not e.g. an en-route CTR that happens to be online.
  xfer_twr_to_gnd:
    action: XFER
    direction: either
    controller: myself
    groundstates: ['', NSTS, ARR]
    airborne: false
    myRole: [TWR, APP, CTR]
    notMyRole: [GND]
    nextControllerRole: [GND]
    priority: 110

  # === EXISTING RULES (with role conditions where needed) ===

  # INBOUND arrivals: ASSUME to take control (TWR/APP/CTR top-down)
  assume_inbound:
    action: ASSUME
    sectionId: inbound
    direction: arrival
    controller: not_myself
    myRole: [TWR, APP, CTR]
    priority: 100

  # CTR ARR: CTL (cleared to land) for arrivals and local flights (TWR/APP/CTR top-down)
  ctl_ctr_arr:
    action: CTL
    sectionId: ctr_arr
    direction: either
    controller: myself
    clearedToLand: false  # Only if not already cleared
    myRole: [TWR]
    priority: 90

  # RUNWAY lineup: CTO (cleared for takeoff) for departures and local (TWR/APP/CTR top-down)
  # No sectionId — works for both single-runway and dual-runway layouts
  cto_lineup:
    action: CTO
    direction: either
    controller: myself
    groundstates: [LINEUP]
    myRole: [TWR]
    priority: 90

  # TAXI departures: LU (line up) — frontend shows LU+CTO pair (TWR/APP/CTR top-down)
  lu_taxi_dep:
    action: LU
    direction: departure
    controller: myself
    groundstates: [TAXI]
    myRole: [TWR]
    priority: 85

  # TAXI local flights: LU (line up) — frontend shows LU+CTO pair (TWR/APP/CTR top-down)
  lu_taxi_local:
    action: LU
    direction: local
    controller: myself
    groundstates: [TAXI]
    myRole: [TWR]
    priority: 85

  # CTR DEP missed approach: XFER to APP when APP is separately online (TWR top-down)
  xfer_missed_approach:
    action: XFER
    missedApproach: true
    controller: myself
    handoffInitiated: false
    myRole: [TWR]
    notMyRole: [APP, CTR]
    priority: 102

  # CTR DEP airborne: XFER (transfer to next controller) (TWR/APP/CTR top-down)
  # Departures only — local flights stay in the pattern, no XFER
  xfer_ctr_dep:
    action: XFER
    sectionId: ctr_dep
    direction: departure
    controller: myself
    airborne: true
    handoffInitiated: false
    myRole: [TWR]
    priority: 80

  # Taxiing arrivals/local: PARK (set parked) (GND/TWR/APP/CTR)
  park_arr:
    action: PARK
    direction: either
    controller: myself
    groundstates: [TXIN]
    onRunway: false
    myRole: [GND]
    priority: 77

  # PUSH&START departures/local with PUSH groundstate: TXO (taxi out) (GND/TWR/APP/CTR)
  txo_push:
    action: TXO
    sectionId: push_start
    direction: either
    controller: myself
    groundstates: [PUSH, STUP]
    myRole: [GND]
    priority: 75

  # PENDING DEP departures/local without clearance: CLNC (open clearance dialog)
  # Only shown when DEL is not separately online (I'm covering DEL duties)
  clnc_pending_dep:
    action: CLNC
    sectionId: pending_dep
    direction: either
    clearance: false
    myRole: [DEL]
    priority: 65

  # CLEARED departures/local: PUSH (approve startup/pushback) (GND/TWR/APP/CTR)
  push_cleared:
    action: PUSH
    sectionId: cleared
    direction: either
    controller: myself
    clearance: true
    groundstates: ['', ONFREQ, STUP, NSTS]
    myRole: [GND]
    priority: 70

  # === CATCH-ALL ASSUME RULES ===

  # Assume any departure/local tracked by someone else when I'm covering DEL duties
  assume_departure_ground:
    action: ASSUME
    direction: either
    controller: not_myself
    airborne: false
    myRole: [DEL]
    priority: 10

  # Assume any untracked arrival (GND/TWR/APP/CTR)
  assume_arrival:
    action: ASSUME
    direction: arrival
    controller: not_myself
    myRole: [GND]
    priority: 10

deleteRules:
  # Departures: Delete when high enough and transferred/freed
  # Altitude > field elevation + 2500ft AND not controlled by me
  delete_dep_high_transferred:
    direction: departure
    controller: not_myself
    minAltitudeAboveField: 2500
    priority: 100

  # Arrivals/local: Delete when parked
  delete_parked:
    direction: either
    groundstates: [PARK]
    priority: 100

  # Fallback: Delete any aircraft that moves beyond radar range
  delete_beyond_range:
    beyondRange: true
    priority: 10

moveRules:
  # === RUNWAY EXIT — CLEAR CLEARED-TO-LAND ===
  # These use fromSectionIdContains so they match any runway section ID
  # (e.g. "runway", "arr_runway", "dep_runway") without needing per-config rules.

  # Any runway section -> CTR ARR: Unset cleared to land (undo/go-around)
  runway_to_ctr_arr_clear_ctl:
    fromSectionIdContains: runway
    toSectionId: ctr_arr
    command:
      type: setClearedToLand
      value: false

  # Any runway section -> CTR DEP: Unset cleared to land (go-around)
  runway_to_ctr_dep_clear_ctl:
    fromSectionIdContains: runway
    toSectionId: ctr_dep
    command:
      type: setClearedToLand
      value: false

  # Any section -> CTR DEP: Set groundstate to DEPA
  move_to_ctr_dep_set_depa:
    toSectionId: ctr_dep
    command:
      type: setGroundstate
      value: DEPA

  # === DEPARTURE/LOCAL FLOW ===

  # PENDING DEP -> CLEARED: Set clearance flag (DEL/TWR/APP/CTR)
  move_pending_to_cleared:
    fromSectionId: pending_dep
    toSectionId: cleared
    direction: either
    myRole: [DEL]
    command:
      type: setClearance
      value: true

  # CLEARED -> PUSH&START: Set groundstate to PUSH (GND/TWR/APP/CTR)
  move_cleared_to_push:
    fromSectionId: cleared
    toSectionId: push_start
    direction: either
    myRole: [GND]
    command:
      type: setGroundstate
      value: PUSH

  # PUSH&START -> TAXI: Set groundstate to TAXI (GND/TWR/APP/CTR)
  move_push_to_taxi:
    fromSectionId: push_start
    toSectionId: taxi
    direction: either
    myRole: [GND]
    command:
      type: setGroundstate
      value: TAXI

  # === UNDO OPERATIONS ===

  # CLEARED -> PENDING DEP: Unset clearance flag
  undo_cleared_to_pending:
    fromSectionId: cleared
    toSectionId: pending_dep
    direction: either
    command:
      type: setClearance
      value: false

  # PUSH&START -> CLEARED: Set groundstate to ONFREQ
  undo_push_to_cleared:
    fromSectionId: push_start
    toSectionId: cleared
    direction: either
    command:
      type: setGroundstate
      value: ONFREQ

  # TAXI -> PUSH&START: Set groundstate to PUSH
  undo_taxi_to_push:
    fromSectionId: taxi
    toSectionId: push_start
    direction: either
    command:
      type: setGroundstate
      value: PUSH
