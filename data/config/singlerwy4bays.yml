# VatEFS Configuration for single runway, 4 bays, kind like at ESGG (Gothenburg)
# Note: Airports are discovered at runtime from EuroScope's rwyconfig
# or can be set via --airport CLI argument

name: 1RWY4BAY
radarRange: 25  # nm

include:
  - common-rules.yml

layout:
  bays:
    bay1:
      sections:
        inbound:
          title: INBOUND

    bay2:
      sections:
        ctr_arr:
          title: CTR ARR
        runway:
          title: RUNWAY
        ctr_dep:
          title: CTR DEP

    bay3:
      sections:
        taxi:
          title: TAXI
        push_start:
          title: PUSH&START

    bay4:
      sections:
        pending_dep:
          title: PENDING DEP
        cleared:
          title: CLEARED

sectionRules:
  # === GEOGRAPHIC RUNWAY DETECTION (highest priority) ===

  # Any aircraft physically on a runway (detected by geographic position and altitude)
  # This overrides all other section rules
  on_runway_geographic:
    sectionId: runway
    onRunway: true
    priority: 200

  # === RUNWAY SECTION RULES ===

  # RUNWAY: Lineup and departure roll
  runway_lineup_depa:
    sectionId: runway
    airborne: false
    groundstates: [LINEUP, DEPA]
    priority: 90

  # RUNWAY: Cleared to land (arrivals and local flights returning)
  runway_cleared_to_land:
    sectionId: runway
    direction: either
    clearedToLand: true
    airborne: true
    groundstates: ['', NSTS, ARR]
    priority: 95

actionRules:
  # RUNWAY: GOA (go-around) for airborne aircraft cleared to land (TWR/APP/CTR top-down)
  goa_runway:
    action: GOA
    sectionId: runway
    direction: either
    controller: myself
    airborne: true
    clearedToLand: true
    myRole: [TWR, APP, CTR]
    priority: 95

moveRules:
  # TAXI -> RUNWAY: Set groundstate to LINEUP (TWR/APP/CTR top-down)
  move_taxi_to_runway:
    fromSectionId: taxi
    toSectionId: runway
    direction: either
    myRole: [TWR, APP, CTR]
    command:
      type: setGroundstate
      value: LINEUP

  # INBOUND -> RUNWAY: Set cleared to land (TWR/APP/CTR top-down)
  move_inbound_to_runway:
    fromSectionId: inbound
    toSectionId: runway
    direction: arrival
    myRole: [TWR, APP, CTR]
    command:
      type: setClearedToLand
      value: true

  # CTR ARR -> RUNWAY: Set cleared to land (TWR/APP/CTR top-down)
  # Also applies to local flights manually placed in CTR ARR
  move_ctr_arr_to_runway:
    fromSectionId: ctr_arr
    toSectionId: runway
    direction: either
    myRole: [TWR, APP, CTR]
    command:
      type: setClearedToLand
      value: true

  # RUNWAY -> TAXI (departure): Set groundstate to TAXI
  move_runway_to_taxi_dep:
    fromSectionId: runway
    toSectionId: taxi
    direction: departure
    priority: 10
    command:
      type: setGroundstate
      value: TAXI

  # RUNWAY -> TAXI (arrival/local): Set groundstate to TXIN (GND/TWR/APP/CTR)
  move_runway_to_taxi_arr:
    fromSectionId: runway
    toSectionId: taxi
    direction: either
    myRole: [GND, TWR, APP, CTR]
    command:
      type: setGroundstate
      value: TXIN

  # Runway -> CTR ARR/DEP: Unset cleared to land — now handled by common-rules.yml (runway_to_ctr_*_clear_ctl)
